<!DOCTYPE html>
<html lang="sv">
<head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg:           #f0f4f8;
        --surface:      #ffffff;
        --surface-alt:  #f8fafc;
        --border:       #e2e8f0;
        --text-primary: #0f172a;
        --text-secondary:#475569;
        --text-muted:   #94a3b8;
        --accent:       #0d9488;
        --accent-hover: #0f766e;
        --accent-light: #f0fdfa;
        --accent-mid:   #ccfbf1;
        --green:        #16a34a;
        --green-light:  #dcfce7;
        --red:          #dc2626;
        --red-light:    #ffe4e6;
        --radius-xl: 20px;
        --radius-lg: 14px;
        --radius-md: 10px;
        --radius-sm: 7px;
        --shadow:    0 2px 12px rgba(15,23,42,0.08);
        --shadow-lg: 0 8px 32px rgba(15,23,42,0.12);
      }
      *, *::before, *::after { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }
      body { font-family: 'Nunito Sans', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; }

      /* ── LOGIN ── */
      #login-screen { display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
      .login-card { background: var(--surface); border-radius: var(--radius-xl); box-shadow: var(--shadow-lg); padding: 36px 28px; width: 100%; max-width: 380px; border: 1px solid var(--border); }
      .login-logo { font-size: 2rem; margin-bottom: 10px; }
      .login-card h1 { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1.7rem; margin: 0 0 5px; letter-spacing: -0.5px; }
      .login-card p { color: var(--text-secondary); margin: 0 0 24px; font-size: 0.88rem; }
      .field { margin-bottom: 14px; }
      .field label { display: block; font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-secondary); margin-bottom: 5px; }
      .field input { width: 100%; padding: 12px 14px; border: 2px solid var(--border); border-radius: var(--radius-sm); font-family: 'Nunito Sans', sans-serif; font-size: 16px; transition: border-color 0.15s, box-shadow 0.15s; }
      .field input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(13,148,136,0.12); }
      .btn-login { width: 100%; background: var(--accent); color: white; padding: 14px; border: none; border-radius: var(--radius-md); font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 800; cursor: pointer; margin-top: 6px; transition: background 0.15s; letter-spacing: 0.02em; }
      .btn-login:hover { background: var(--accent-hover); }
      #login-msg { margin-top: 12px; padding: 10px 14px; border-radius: var(--radius-sm); display: none; font-size: 0.86rem; font-weight: 700; }
      .success { background: var(--green-light); color: var(--green); border: 1.5px solid #bbf7d0; }
      .error   { background: var(--red-light); color: var(--red); border: 1.5px solid #fecdd3; }

      /* ── TOPBAR ── */
      #admin-screen { display: none; }
      .topbar {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 0 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        height: 52px;
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: var(--shadow);
        gap: 10px;
      }
      .topbar-brand { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1rem; letter-spacing: -0.3px; white-space: nowrap; }
      .topbar-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
      .admin-pill { background: var(--accent-light); color: var(--accent); border: 1px solid var(--accent-mid); border-radius: 20px; padding: 3px 10px; font-weight: 800; font-size: 0.75rem; white-space: nowrap; }
      .btn-sm { background: var(--surface-alt); border: 1.5px solid var(--border); color: var(--text-primary); padding: 6px 12px; border-radius: var(--radius-sm); font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; transition: background 0.12s; white-space: nowrap; }
      .btn-sm:hover { background: var(--border); }

      /* ── BODY ── */
      .admin-body { max-width: 1000px; margin: 0 auto; padding: 16px 12px 40px; }

      /* ── STATS ── */
      .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
      .stat { background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius-lg); padding: 16px 12px; text-align: center; box-shadow: var(--shadow); }
      .stat-num { font-family: 'Nunito', sans-serif; font-size: 2.2rem; font-weight: 900; line-height: 1; margin-bottom: 4px; }
      .stat-lbl { font-size: 0.68rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); }
      .stat.green .stat-num { color: var(--green); }
      .stat.red   .stat-num { color: var(--red); }
      .stat.teal  .stat-num { color: var(--accent); }

      /* ── TOOLBAR ── */
      .toolbar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; align-items: center; }
      .search { flex: 1; min-width: 160px; padding: 9px 12px; border: 2px solid var(--border); border-radius: var(--radius-md); font-family: 'Nunito Sans', sans-serif; font-size: 14px; }
      .search:focus { outline: none; border-color: var(--accent); }
      .filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
      .filter { padding: 7px 12px; border-radius: var(--radius-md); border: 2px solid var(--border); background: var(--surface); font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; color: var(--text-secondary); transition: all 0.12s; white-space: nowrap; }
      .filter.on { background: var(--accent); color: white; border-color: var(--accent); }

      /* Historik-knapp */
      .history-toggle { display: flex; justify-content: center; margin: 8px 0 16px; }
      .btn-history { background: none; border: 2px dashed var(--border); border-radius: var(--radius-md); padding: 8px 18px; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; color: var(--text-muted); transition: all 0.15s; }
      .btn-history:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
      .btn-history.active { background: var(--accent-light); color: var(--accent); border-color: var(--accent); border-style: solid; }

      /* ── PASS BLOCK ── */
      .pass-block { background: var(--surface); border: 2px solid var(--border); border-radius: var(--radius-xl); margin-bottom: 14px; overflow: hidden; box-shadow: var(--shadow); }
      .pass-block.historical { opacity: 0.7; }
      .pass-block-head { padding: 14px 16px; background: var(--surface-alt); border-bottom: 2px solid var(--border); }
      .pass-block-head-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
      .pass-block-title { font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 900; margin: 0 0 5px; letter-spacing: -0.2px; }
      .pass-block-sub { font-size: 0.79rem; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
      .badge { display: inline-block; font-size: 0.67rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; padding: 2px 8px; border-radius: 20px; }
      .badge-event { background: #0f172a; color: white; }
      .badge-booked { background: var(--green-light); color: var(--green); }
      .badge-cancelled { background: var(--red-light); color: var(--red); }
      .badge-deleted { background: #f1f5f9; color: #94a3b8; }
      .badge-past { background: #f1f5f9; color: #94a3b8; font-size: 0.62rem; }

      /* Ansvarig */
      .ansvarig-control { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
      .ansvarig-lbl { font-size: 0.75rem; font-weight: 700; color: var(--text-secondary); }
      .ansvarig-val { font-size: 0.85rem; font-weight: 800; color: var(--text-primary); }
      .ansvarig-sel { padding: 5px 10px; border: 2px solid var(--border); border-radius: var(--radius-sm); font-family: 'Nunito Sans', sans-serif; font-size: 13px; display: none; max-width: 160px; }
      .btn-edit { background: none; border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 4px 10px; font-size: 12px; font-weight: 700; cursor: pointer; color: var(--text-secondary); transition: all 0.12s; }
      .btn-edit:hover { background: var(--accent); color: white; border-color: var(--accent); }
      .btn-save { background: var(--green); color: white; border: none; border-radius: var(--radius-sm); padding: 5px 12px; font-size: 12px; font-weight: 800; cursor: pointer; display: none; }
      .btn-cancel-edit { background: none; border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 5px 10px; font-size: 12px; cursor: pointer; display: none; }

      /* ── DESKTOP TABLE ── */
      .btable-wrap { overflow-x: auto; }
      .btable { width: 100%; border-collapse: collapse; }
      .btable th { background: var(--surface-alt); padding: 9px 14px; font-size: 0.68rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.07em; color: var(--text-muted); text-align: left; border-bottom: 2px solid var(--border); }
      .btable td { padding: 11px 14px; border-bottom: 1px solid var(--border); font-size: 0.84rem; vertical-align: middle; }
      .btable tr:last-child td { border-bottom: none; }
      .btable tr.dim td { color: var(--text-muted); }
      .person-name { font-weight: 700; margin-bottom: 2px; }
      .contact-row { display: flex; gap: 10px; flex-wrap: wrap; font-size: 0.78rem; }
      .clink { color: var(--accent); text-decoration: none; font-weight: 700; }
      .clink:hover { text-decoration: underline; }
      .btn-delete { background: var(--red-light); color: var(--red); border: 1.5px solid #fecdd3; border-radius: var(--radius-sm); padding: 5px 12px; font-size: 12px; font-weight: 800; cursor: pointer; transition: all 0.12s; white-space: nowrap; }
      .btn-delete:hover { background: var(--red); color: white; }

      /* ── MOBILE CARDS (under 680px) ── */
      .booking-cards { display: none; }
      .booking-card { padding: 12px 16px; border-bottom: 1px solid var(--border); }
      .booking-card:last-child { border-bottom: none; }
      .booking-card.dim { opacity: 0.55; }
      .bc-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
      .bc-name { font-weight: 800; font-size: 0.92rem; }
      .bc-contact { display: flex; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
      .bc-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
      .bc-date { font-size: 0.75rem; color: var(--text-muted); }
      .bc-reason { font-size: 0.78rem; color: var(--text-muted); font-style: italic; margin-top: 4px; }

      @media (max-width: 680px) {
        .btable-wrap { display: none; }
        .booking-cards { display: block; }

        .stats-row { gap: 8px; }
        .stat-num { font-size: 1.8rem; }
        .stat-lbl { font-size: 0.62rem; }
        .stat { padding: 12px 8px; }

        .admin-body { padding: 12px 10px 40px; }

        .pass-block-title { font-size: 0.95rem; }
      }

      /* ── ADD PERSON FORM ── */
      .add-person-row { padding: 12px 16px; border-top: 2px dashed var(--border); background: #f8fafc; }
      .add-person-btn { background: none; border: 2px dashed var(--border); border-radius: var(--radius-md); padding: 9px 16px; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; color: var(--text-muted); width: 100%; text-align: center; transition: all 0.15s; }
      .add-person-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
      .add-person-form { display: none; }
      .add-person-form.open { display: block; }
      .add-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 12px 0 8px; }
      @media (max-width: 480px) { .add-form-grid { grid-template-columns: 1fr; } }
      .add-form-grid input { padding: 10px 12px; border: 2px solid var(--border); border-radius: var(--radius-sm); font-family: 'Nunito Sans', sans-serif; font-size: 15px; transition: border-color 0.15s; width: 100%; }
      .add-form-grid input:focus { outline: none; border-color: var(--accent); }
      .add-form-grid input.invalid { border-color: var(--red); background: var(--red-light); }
      .add-form-actions { display: flex; gap: 8px; justify-content: flex-end; flex-wrap: wrap; }
      .btn-add-confirm { background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); padding: 10px 20px; font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 800; cursor: pointer; transition: background 0.12s; flex: 1; }
      .btn-add-confirm:hover { background: var(--accent-hover); }
      .btn-add-confirm:disabled { opacity: 0.5; cursor: not-allowed; }
      .btn-add-cancel { background: none; border: 1.5px solid var(--border); border-radius: var(--radius-sm); padding: 10px 16px; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 700; cursor: pointer; color: var(--text-secondary); }

      /* ── EMPTY STATE ── */
      .empty-pass { padding: 20px; text-align: center; color: var(--text-muted); font-style: italic; font-size: 0.85rem; }

      /* ── TOAST ── */
      #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--accent); color: white; padding: 12px 22px; border-radius: var(--radius-md); font-family: 'Nunito', sans-serif; font-size: 0.88rem; font-weight: 800; z-index: 9999; box-shadow: var(--shadow-lg); display: none; max-width: 88vw; text-align: center; }
      #toast.ok  { background: var(--green); }
      #toast.err { background: var(--red); }

      .spinner { display: inline-block; width: 18px; height: 18px; border: 2.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.65s linear infinite; vertical-align: middle; margin-right: 8px; }
      @keyframes spin { to { transform: rotate(360deg); } }
      .loading { text-align: center; padding: 40px; color: var(--text-muted); }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🎭</div>
    <h1>Admin</h1>
    <p>Logga in med dina initialer och din personliga kod.</p>
    <div class="field">
      <label for="ini">Initialer</label>
      <input type="text" id="ini" placeholder="t.ex. JS" autocomplete="username" autocapitalize="none">
    </div>
    <div class="field">
      <label for="kod">Kod</label>
      <input type="password" id="kod" placeholder="••••" autocomplete="current-password">
    </div>
    <button class="btn-login" onclick="login()">Logga in</button>
    <div id="login-msg"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="admin-screen">
  <div class="topbar">
    <span class="topbar-brand">🎭 Cafébokning</span>
    <div class="topbar-right">
      <span class="admin-pill" id="admin-display"></span>
      <button class="btn-sm" onclick="refreshData()">↻</button>
    </div>
  </div>

  <div class="admin-body">

    <div class="stats-row">
      <div class="stat red"><div class="stat-num" id="s-booked">—</div><div class="stat-lbl">Bokade</div></div>
      <div class="stat green"><div class="stat-num" id="s-avail">—</div><div class="stat-lbl">Lediga</div></div>
      <div class="stat teal"><div class="stat-num" id="s-total">—</div><div class="stat-lbl">Totalt</div></div>
    </div>

    <div class="toolbar">
      <input type="text" class="search" id="search" placeholder="Sök namn, e-post, telefon…" oninput="render()">
      <div class="filter-row">
        <button class="filter on" onclick="setFilter('all',this)">Alla</button>
        <button class="filter" onclick="setFilter('Bokad',this)">Bokade</button>
        <button class="filter" onclick="setFilter('other',this)">Avbokade</button>
      </div>
    </div>

    <div id="view"><div class="loading"><span class="spinner"></span> Laddar…</div></div>

    <div class="history-toggle">
      <button class="btn-history" id="history-btn" onclick="toggleHistory()">🕐 Visa historik (gamla pass)</button>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
  let token = null, adminName = '', data = null, activeFilter = 'all', showHistory = false;

  const todayMs = (() => { const d = new Date(); d.setHours(0,0,0,0); return d.getTime(); })();

  document.getElementById('kod').addEventListener('keyup', e => { if (e.key === 'Enter') login(); });
  document.getElementById('ini').addEventListener('keyup', e => { if (e.key === 'Enter') login(); });

  function login() {
    const ini = document.getElementById('ini').value.trim();
    const kod = document.getElementById('kod').value.trim();
    if (!ini || !kod) { msg('Fyll i båda fälten.', false); return; }
    msg('Kontrollerar…', true);
    google.script.run
      .withSuccessHandler(onLogin)
      .withFailureHandler(() => msg('Tekniskt fel.', false))
      .verifyAdminAndGetData(ini, kod);
  }

  function onLogin(res) {
    if (res.success) {
      token = res.token; adminName = res.adminName;
      document.getElementById('admin-display').textContent = adminName;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-screen').style.display = 'block';
      applyData(res.data);
    } else { msg(res.message, false); }
  }

  function refreshData() {
    document.getElementById('view').innerHTML = '<div class="loading"><span class="spinner"></span> Uppdaterar…</div>';
    google.script.run
      .withSuccessHandler(applyData)
      .withFailureHandler(() => toast('Kunde inte uppdatera.', false))
      .refreshAdminBookings(token);
  }

  function applyData(d) {
    data = d;
    // Stats visar bara kommande pass
    const upcomingPasses = Object.values(d.passes).filter(p => (p.rawDate || 0) >= todayMs);
    const upcomingIds = new Set(
      Object.entries(d.passes)
        .filter(([,p]) => (p.rawDate || 0) >= todayMs)
        .map(([id]) => id)
    );
    const upcomingBookings = d.bookings.filter(b => upcomingIds.has(String(b.passId)));
    const booked = upcomingBookings.filter(b => b.status === 'Bokad').length;
    const total  = upcomingPasses.reduce((s, p) => s + (p.total || 0), 0);

    document.getElementById('s-booked').textContent = booked;
    document.getElementById('s-avail').textContent  = total - booked;
    document.getElementById('s-total').textContent  = total;
    render();
  }

  function setFilter(f, btn) {
    activeFilter = f;
    document.querySelectorAll('.filter').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    render();
  }

  function toggleHistory() {
    showHistory = !showHistory;
    const btn = document.getElementById('history-btn');
    btn.classList.toggle('active', showHistory);
    btn.textContent = showHistory ? '🕐 Dölj historik' : '🕐 Visa historik (gamla pass)';
    render();
  }

  function render() {
    if (!data) return;
    const { bookings, passes, ansvariga } = data;
    const q = document.getElementById('search').value.toLowerCase();

    const groups = {};
    bookings.forEach(b => { if (!groups[b.passId]) groups[b.passId] = []; groups[b.passId].push(b); });

    const sortedIds = Object.keys(passes).sort((a, b) => ((passes[a]||{}).rawDate||0) - ((passes[b]||{}).rawDate||0));

    let html = ''; let shown = 0;

    sortedIds.forEach(pid => {
      const p = passes[pid] || {};
      const isPast = (p.rawDate || 0) < todayMs;

      // Dölj gamla pass om historik inte visas
      if (isPast && !showHistory) return;

      const all = groups[pid] || [];

      const filtered = all.filter(b => {
        const mSearch = !q || b.namn.toLowerCase().includes(q) || b.epost.toLowerCase().includes(q) || (b.telefon||'').includes(q);
        const mFilter = activeFilter === 'all' || (activeFilter === 'Bokad' && b.status === 'Bokad') || (activeFilter === 'other' && b.status !== 'Bokad');
        return mSearch && mFilter;
      });

      if (q) {
        const passMatch = (p.datum||'').toLowerCase().includes(q) || (p.forestallning||'').toLowerCase().includes(q) || (p.uppgift||'').toLowerCase().includes(q) || (p.huvudansvarig||'').toLowerCase().includes(q);
        if (!passMatch && filtered.length === 0) return;
      }

      shown++;
      const bookedN = all.filter(b => b.status === 'Bokad').length;
      const opts = (ansvariga||[]).map(n => `<option value="${n}"${n === p.huvudansvarig ? ' selected' : ''}>${n}</option>`).join('');

      html += `
        <div class="pass-block${isPast ? ' historical' : ''}">
          <div class="pass-block-head">
            <div class="pass-block-head-top">
              <div style="flex:1;min-width:0">
                <div class="pass-block-title">${p.datum||'—'} <span style="font-size:0.84rem;color:var(--text-muted);font-weight:600">${p.tid||''}</span></div>
                <div class="pass-block-sub">
                  <span class="badge badge-event">${p.forestallning||'—'}</span>
                  <span>${p.uppgift||''}</span>
                  <span>·</span>
                  <strong>${bookedN}</strong>&nbsp;/&nbsp;${p.total||0} bokade
                  ${isPast ? '<span class="badge badge-past">Passerat</span>' : ''}
                </div>
              </div>
            </div>
            <div class="ansvarig-control">
              <span class="ansvarig-lbl">Ansvarig:</span>
              <span class="ansvarig-val" id="av-${pid}">${p.huvudansvarig||'Ingen'}</span>
              <select class="ansvarig-sel" id="as-${pid}">${opts}</select>
              <button class="btn-edit" id="be-${pid}" onclick="editA('${pid}')">Byt</button>
              <button class="btn-save" id="bs-${pid}" onclick="saveA('${pid}')">Spara</button>
              <button class="btn-cancel-edit" id="bc-${pid}" onclick="cancelA('${pid}')">✕</button>
            </div>
          </div>

          <!-- DESKTOP: tabell -->
          <div class="btable-wrap">
            <table class="btable">
              <thead><tr><th>Person</th><th>Kontakt</th><th>Bokad</th><th>Status</th><th>Anledning</th><th></th></tr></thead>
              <tbody>
                ${filtered.length === 0
                  ? `<tr><td colspan="6" class="empty-pass">📭 Inga bokningar ännu.</td></tr>`
                  : filtered.map(bookingRowDesktop).join('')}
              </tbody>
            </table>
          </div>

          <!-- MOBIL: kort -->
          <div class="booking-cards">
            ${filtered.length === 0
              ? `<div class="empty-pass">📭 Inga bokningar ännu.</div>`
              : filtered.map(bookingRowMobile).join('')}
          </div>

          ${!isPast ? `
          <div class="add-person-row" id="apr-${pid}">
            <button class="add-person-btn" id="apb-${pid}" onclick="toggleAddForm('${pid}')">+ Lägg till person manuellt</button>
            <div class="add-person-form" id="apf-${pid}">
              <div class="add-form-grid">
                <input type="text" id="ap-fornamn-${pid}" placeholder="Förnamn *" autocomplete="given-name">
                <input type="text" id="ap-efternamn-${pid}" placeholder="Efternamn *" autocomplete="family-name">
                <input type="email" id="ap-epost-${pid}" placeholder="E-post (valfritt)" autocomplete="email">
                <input type="tel" id="ap-telefon-${pid}" placeholder="Telefon (valfritt)" autocomplete="tel">
              </div>
              <div class="add-form-actions">
                <button class="btn-add-cancel" onclick="closeAddForm('${pid}')">Avbryt</button>
                <button class="btn-add-confirm" id="ap-save-${pid}" onclick="adminAddPerson('${pid}')">Boka in person</button>
              </div>
            </div>
          </div>` : ''}
        </div>`;
    });

    document.getElementById('view').innerHTML = shown === 0
      ? `<div class="loading" style="color:var(--text-muted)">
           ${q ? 'Inga pass matchar sökningen.' : 'Inga kommande pass just nu.'}
         </div>`
      : html;
  }

  function bookingRowDesktop(b) {
    const dim = b.status !== 'Bokad';
    const badge = b.status === 'Bokad'
      ? '<span class="badge badge-booked">Bokad</span>'
      : b.status === 'Avbokad'
        ? '<span class="badge badge-cancelled">Avbokad</span>'
        : '<span class="badge badge-deleted">Raderad</span>';
    return `
      <tr class="${dim ? 'dim' : ''}">
        <td><div class="person-name">${b.namn}</div></td>
        <td><div class="contact-row">
          ${b.epost ? `<a href="mailto:${b.epost}" class="clink">✉ ${b.epost}</a>` : ''}
          ${b.telefon ? `<a href="tel:${b.telefon}" class="clink">📞 ${b.telefon}</a>` : ''}
        </div></td>
        <td style="font-size:0.76rem;color:var(--text-muted);white-space:nowrap">${b.bokadDatum}</td>
        <td>${badge}</td>
        <td style="font-size:0.78rem;color:var(--text-muted);font-style:italic;max-width:140px">${b.anledning||''}</td>
        <td style="text-align:right">${b.status === 'Bokad' ? `<button class="btn-delete" onclick="delBooking(${b.rowId},this)">Radera</button>` : ''}</td>
      </tr>`;
  }

  function bookingRowMobile(b) {
    const dim = b.status !== 'Bokad';
    const badge = b.status === 'Bokad'
      ? '<span class="badge badge-booked">Bokad</span>'
      : b.status === 'Avbokad'
        ? '<span class="badge badge-cancelled">Avbokad</span>'
        : '<span class="badge badge-deleted">Raderad</span>';
    return `
      <div class="booking-card${dim ? ' dim' : ''}">
        <div class="bc-top">
          <span class="bc-name">${b.namn}</span>
          ${badge}
        </div>
        <div class="bc-contact">
          ${b.epost ? `<a href="mailto:${b.epost}" class="clink" style="font-size:0.82rem">✉ ${b.epost}</a>` : ''}
          ${b.telefon ? `<a href="tel:${b.telefon}" class="clink" style="font-size:0.82rem">📞 ${b.telefon}</a>` : ''}
        </div>
        ${b.anledning ? `<div class="bc-reason">"${b.anledning}"</div>` : ''}
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">
          <span class="bc-date">${b.bokadDatum}</span>
          ${b.status === 'Bokad' ? `<button class="btn-delete" style="padding:6px 14px;font-size:12px" onclick="delBooking(${b.rowId},this)">Radera</button>` : ''}
        </div>
      </div>`;
  }

  // Ansvarig edit
  function editA(pid) {
    document.getElementById('av-'+pid).style.display = 'none';
    document.getElementById('be-'+pid).style.display = 'none';
    document.getElementById('as-'+pid).style.display = 'inline-block';
    document.getElementById('bs-'+pid).style.display = 'inline-block';
    document.getElementById('bc-'+pid).style.display = 'inline-block';
  }
  function cancelA(pid) {
    document.getElementById('av-'+pid).style.display = '';
    document.getElementById('be-'+pid).style.display = '';
    document.getElementById('as-'+pid).style.display = 'none';
    document.getElementById('bs-'+pid).style.display = 'none';
    document.getElementById('bc-'+pid).style.display = 'none';
  }
  function saveA(pid) {
    const ny = document.getElementById('as-'+pid).value;
    document.getElementById('bs-'+pid).textContent = '…';
    google.script.run
      .withSuccessHandler(r => {
        if (r.success) {
          document.getElementById('av-'+pid).textContent = ny;
          if (data.passes[pid]) data.passes[pid].huvudansvarig = ny;
          cancelA(pid); toast(r.message, true);
        } else { toast(r.message, false); document.getElementById('bs-'+pid).textContent = 'Spara'; }
      })
      .withFailureHandler(() => toast('Tekniskt fel.', false))
      .adminUpdateHuvudansvarig(pid, ny, token);
  }

  // Delete
  function delBooking(rowId, btn) {
    if (!confirm('Radera bokningen? Den markeras som raderad.')) return;
    btn.disabled = true; btn.textContent = '…';
    google.script.run
      .withSuccessHandler(r => {
        toast(r.message, r.success);
        if (r.success) refreshData();
        else { btn.disabled = false; btn.textContent = 'Radera'; }
      })
      .withFailureHandler(() => { toast('Tekniskt fel.', false); btn.disabled = false; btn.textContent = 'Radera'; })
      .adminDeleteBooking(rowId, token);
  }

  // Add person
  function toggleAddForm(pid) {
    const form = document.getElementById('apf-'+pid);
    const btn  = document.getElementById('apb-'+pid);
    const open = form.classList.contains('open');
    form.classList.toggle('open', !open);
    btn.style.display = open ? '' : 'none';
    if (!open) document.getElementById('ap-fornamn-'+pid).focus();
  }
  function closeAddForm(pid) {
    document.getElementById('apf-'+pid).classList.remove('open');
    document.getElementById('apb-'+pid).style.display = '';
    ['fornamn','efternamn','epost','telefon'].forEach(f => {
      const el = document.getElementById('ap-'+f+'-'+pid);
      el.value = ''; el.classList.remove('invalid');
    });
  }
  function adminAddPerson(pid) {
    const fornamn   = document.getElementById('ap-fornamn-'+pid).value.trim();
    const efternamn = document.getElementById('ap-efternamn-'+pid).value.trim();
    const epost     = document.getElementById('ap-epost-'+pid).value.trim();
    const telefon   = document.getElementById('ap-telefon-'+pid).value.trim();
    let valid = true;
    ['fornamn','efternamn'].forEach(f => {
      const el = document.getElementById('ap-'+f+'-'+pid);
      if (!el.value.trim()) { el.classList.add('invalid'); valid = false; }
      else el.classList.remove('invalid');
    });
    if (!valid) return;
    const saveBtn = document.getElementById('ap-save-'+pid);
    saveBtn.disabled = true; saveBtn.textContent = '…';
    google.script.run
      .withSuccessHandler(r => {
        saveBtn.disabled = false; saveBtn.textContent = 'Boka in person';
        if (r.success) { closeAddForm(pid); toast(r.message, true); refreshData(); }
        else toast(r.message, false);
      })
      .withFailureHandler(() => { saveBtn.disabled = false; saveBtn.textContent = 'Boka in person'; toast('Tekniskt fel.', false); })
      .adminBokaManually(pid, fornamn+' '+efternamn, epost, telefon, token);
  }

  function toast(m, ok) {
    const t = document.getElementById('toast');
    t.textContent = m; t.className = ok ? 'ok' : 'err'; t.style.display = 'block';
    clearTimeout(t._t); t._t = setTimeout(() => t.style.display = 'none', 4000);
  }
  function msg(m, ok) {
    const el = document.getElementById('login-msg');
    el.textContent = m; el.className = ok ? 'success' : 'error'; el.style.display = 'block';
  }
</script>
</body>
</html>
